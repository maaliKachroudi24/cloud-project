events {}

http {

# ════════════════════════════════════════════════════════════════
# nginx.conf – Partie 6 : HTTPS + API Gateway + Load Balancer
#              Partie 7 : Scalabilité (upstream round-robin)
# ════════════════════════════════════════════════════════════════

# Upstream pools pour load balancing (Partie 7)
upstream grh_employees {
    least_conn;
    server app1:5003;
}

upstream grh_payroll {
    least_conn;
    server app2:5001;
}

upstream grh_recruitment {
    least_conn;
    server app3:5002;
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80;
    server_name localhost;

    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ──────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    location /api/employees {
        proxy_pass http://grh_employees;
    }

    location /api/payslips {
        proxy_pass http://grh_payroll;
    }

    location /api/jobs {
        proxy_pass http://grh_recruitment;
    }

    location / {
        return 200 "OK";
    }
}

}