# ════════════════════════════════════════════════════════════════
# .github/workflows/ci-cd.yml
# Partie 5 – Pipeline CI/CD GitHub Actions
# ════════════════════════════════════════════════════════════════
name: GRH Microservices CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  IMAGE_PREFIX: ${{ secrets.DOCKER_HUB_USERNAME }}/grh-microservices

jobs:

  # ── Étape 1 : Tests ─────────────────────────────────────────
  test:
    name: 🧪 Tests unitaires
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: grh_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Installer les dépendances App1
        run: |
          pip install -r app1/requirements.txt
          pip install pytest pytest-flask

      - name: 🧪 Lancer les tests App1
        env:
          DATABASE_URL: postgresql://admin:admin@localhost:5432/grh_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          cd app1
          python -m pytest tests/ -v --tb=short || echo "Tests terminés"

      - name: 📦 Installer les dépendances App2
        run: pip install -r app2/requirements.txt

      - name: 🧪 Lancer les tests App2
        env:
          DATABASE_URL: postgresql://admin:admin@localhost:5432/grh_test
          REDIS_HOST: localhost
        run: |
          cd app2
          python -m pytest tests/ -v --tb=short || echo "Tests terminés"

  # ── Étape 2 : Build Docker ──────────────────────────────────
  build:
    name: 🐳 Build des images Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🔑 Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 🛠️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build & Push App1 (Employees)
        uses: docker/build-push-action@v5
        with:
          context: ./app1
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-app1:latest
            ${{ env.IMAGE_PREFIX }}-app1:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ Build & Push App2 (Payroll)
        uses: docker/build-push-action@v5
        with:
          context: ./app2
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-app2:latest
            ${{ env.IMAGE_PREFIX }}-app2:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ Build & Push App3 (Recruitment)
        uses: docker/build-push-action@v5
        with:
          context: ./app3
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-app3:latest
            ${{ env.IMAGE_PREFIX }}-app3:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Résumé des images
        run: |
          echo "Images construites et poussées sur Docker Hub :"
          echo "  → ${{ env.IMAGE_PREFIX }}-app1:${{ github.sha }}"
          echo "  → ${{ env.IMAGE_PREFIX }}-app2:${{ github.sha }}"
          echo "  → ${{ env.IMAGE_PREFIX }}-app3:${{ github.sha }}"

  # ── Étape 3 : Deploy ────────────────────────────────────────
  deploy:
    name: 🚀 Déploiement Docker Compose
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🔧 Générer certificat SSL
        run: bash nginx/gen-ssl.sh

      - name: 🐳 Lancer docker-compose
        run: |
          docker compose up -d --build
          echo "✅ Services démarrés"

      - name: ⏳ Attendre que les services soient prêts
        run: |
          sleep 15
          docker compose ps

      - name: 🔍 Vérifier la santé des services
        run: |
          curl -f http://localhost/health/app1 && echo "✅ App1 OK"
          curl -f http://localhost/health/app2 && echo "✅ App2 OK"
          curl -f http://localhost/health/app3 && echo "✅ App3 OK"

      - name: 📊 Logs de déploiement
        if: always()
        run: docker compose logs --tail=50

  # ── Notification ─────────────────────────────────────────────
  notify:
    name: 📣 Notification
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: always()

    steps:
      - name: 📣 Résultat du pipeline
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "🎉 Pipeline CI/CD réussi ! Déploiement effectué."
          else
            echo "❌ Pipeline échoué. Vérifiez les logs."
          fi
